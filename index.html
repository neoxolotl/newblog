<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Blog desde GitHub</title>
    <meta name="description" content="Blog cargado directamente desde GitHub">
    <link rel="stylesheet" href="styles.css">

<!-- PWA Meta Tags -->
<meta name="theme-color" content="#24292e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Blog">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- Manifest -->
<link rel="manifest" href="manifest.json">

<!-- Iconos (crear las imágenes) -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

</head>
<body>
    <header>
        <h1>📝 Mi Blog</h1>
        <p>Artículos cargados directamente desde GitHub</p>
        
        <!-- 🔍 BUSCADOR -->
        <div class="search-container">
            <input 
                type="text" 
                id="search-input" 
                class="search-input" 
                placeholder="🔍 Buscar artículos..."
                autocomplete="off"
            >
            <button id="search-clear" class="search-clear" style="display: none;">✕</button>
        </div>
        <div id="search-results-count" class="search-results-count"></div>
    </header>

    <main>
        <!-- Lista de posts -->
        <div id="post-list" class="post-list">
            <div class="loading">🔄 Cargando artículos...</div>
        </div>

        <!-- Contenido del post -->
        <div id="post-content" class="post-content">
            <button class="back-btn" onclick="showList()">← Volver a la lista</button>
            <div id="article"></div>
            
            <!-- Contenedor de comentarios Giscus -->
            <div id="giscus-container"></div>
        </div>
    </main>

    <footer>
        <p>Hecho con ❤️ usando <a href="https://github.com" target="_blank">GitHub</a> y <a href="https://giscus.app" target="_blank">Giscus</a></p>
        <p>© <span id="current-year"></span> neoxolotl</p>
    </footer>

    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        // ⚙️ CONFIGURACIÓN - ACTUALIZA ESTOS VALORES
        const GITHUB_USERNAME = 'neoxolotl';
        const GITHUB_REPO = 'newblog';
        const POSTS_PATH = 'posts/';
        const GITHUB_TOKEN = ''; // Dejar vacío para repos públicos

        // Estado
        let posts = [];
        let filteredPosts = [];
        let giscusLoaded = false;
        let postsContent = {}; // Caché de contenido para búsqueda

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            loadPosts();
            document.getElementById('current-year').textContent = new Date().getFullYear();
            initSearch();
        });

        // =====================================================================
        // FUNCIONES DE BÚSQUEDA
        // =====================================================================

        function initSearch() {
            const searchInput = document.getElementById('search-input');
            const searchClear = document.getElementById('search-clear');

            // Búsqueda en tiempo real
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.trim().toLowerCase();
                
                // Mostrar/ocultar botón de limpiar
                searchClear.style.display = query.length > 0 ? 'block' : 'none';
                
                // Filtrar posts
                filterPosts(query);
            });

            // Botón de limpiar
            searchClear.addEventListener('click', () => {
                searchInput.value = '';
                searchClear.style.display = 'none';
                filterPosts('');
                searchInput.focus();
            });

            // Enter para enfocar
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    searchInput.value = '';
                    searchClear.style.display = 'none';
                    filterPosts('');
                    searchInput.blur();
                }
            });
        }

        function filterPosts(query) {
            if (!query) {
                filteredPosts = posts;
                document.getElementById('search-results-count').textContent = '';
                renderPostList();
                return;
            }

            // Filtrar posts
            filteredPosts = posts.filter(post => {
                const title = post.name.toLowerCase();
                const content = (postsContent[post.name] || '').toLowerCase();
                
                // Buscar en título y contenido
                return title.includes(query) || content.includes(query);
            });

            // Mostrar contador
            const count = filteredPosts.length;
            const total = posts.length;
            document.getElementById('search-results-count').textContent = 
                `${count} resultado${count !== 1 ? 's' : ''} de ${total}`;

            renderPostList();
        }

        // =====================================================================
        // FUNCIONES DE GITHUB API
        // =====================================================================

        async function loadPosts() {
            try {
                const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${POSTS_PATH}`;
                
                const headers = {};
                if (GITHUB_TOKEN) {
                    headers['Authorization'] = `token ${GITHUB_TOKEN}`;
                }

                const response = await fetch(url, { headers });
                
                if (!response.ok) {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }

                const files = await response.json();
                
                // Filtrar solo archivos .md
                posts = files
                    .filter(file => file.name.endsWith('.md'))
                    .map(file => ({
                        name: file.name.replace('.md', ''),
                        url: file.download_url,
                        path: file.path
                    }));

                filteredPosts = posts;
                renderPostList();

            } catch (error) {
                console.error('Error cargando posts:', error);
                document.getElementById('post-list').innerHTML = `
                    <div class="error">
                        <strong>❌ Error cargando artículos:</strong><br><br>
                        ${error.message}<br><br>
                        <small>
                            🔹 Verifica que el repo sea público<br>
                            🔹 Verifica que la carpeta <code>posts/</code> exista<br>
                            🔹 Verifica que haya archivos <code>.md</code> dentro<br>
                            🔹 <a href="https://github.com/${GITHUB_USERNAME}/${GITHUB_REPO}" target="_blank">Ver repositorio en GitHub</a>
                        </small>
                    </div>
                `;
            }
        }

        function renderPostList() {
            const listContainer = document.getElementById('post-list');
            const searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
            
            if (filteredPosts.length === 0) {
                if (searchQuery) {
                    listContainer.innerHTML = `
                        <div class="loading">
                            😕 No se encontraron artículos para "<strong>${escapeHtml(searchQuery)}</strong>"<br><br>
                            <small>Intenta con otros términos</small>
                        </div>
                    `;
                } else {
                    listContainer.innerHTML = `
                        <div class="loading">
                            📭 No hay artículos disponibles<br><br>
                            <small>Crea archivos .md en la carpeta posts/</small>
                        </div>
                    `;
                }
                return;
            }

            listContainer.innerHTML = filteredPosts.map((post, index) => {
                const title = formatTitle(post.name);
                const highlightedTitle = searchQuery ? highlightMatch(title, searchQuery) : title;
                
                return `
                    <div class="post-item" onclick="loadPost(${posts.indexOf(post)})">
                        <h2>${highlightedTitle}</h2>
                        <p class="post-filename">📄 ${post.name}.md</p>
                    </div>
                `;
            }).join('');
        }

        // =====================================================================
        // FUNCIONES DE FRONTMATTER
        // =====================================================================

        function parseFrontmatter(markdown) {
            const frontmatterRegex = /^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/;
            const match = markdown.match(frontmatterRegex);
            
            if (match) {
                const frontmatter = {};
                const lines = match[1].split('\n');
                
                lines.forEach(line => {
                    const colonIndex = line.indexOf(':');
                    if (colonIndex > 0) {
                        const key = line.substring(0, colonIndex).trim();
                        let value = line.substring(colonIndex + 1).trim();
                        
                        // Quitar comillas si existen
                        value = value.replace(/^['"]|['"]$/g, '');
                        
                        // Parsear arrays
                        if (value.startsWith('[') && value.endsWith(']')) {
                            value = value.slice(1, -1).split(',').map(v => v.trim().replace(/['"]/g, ''));
                        }
                        
                        frontmatter[key] = value;
                    }
                });
                
                return {
                    frontmatter,
                    content: match[2]
                };
            }
            
            return {
                frontmatter: {},
                content: markdown
            };
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            
            try {
                const date = new Date(dateString);
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                return date.toLocaleDateString('es-ES', options);
            } catch (e) {
                return dateString;
            }
        }

        // =====================================================================
        // FUNCIONES DE CARGA DE POSTS
        // =====================================================================

        async function loadPost(index) {
            const post = posts[index];
            const articleDiv = document.getElementById('article');
            
            try {
                articleDiv.innerHTML = '<div class="loading">🔄 Cargando artículo...</div>';
                
                const response = await fetch(post.url);
                const markdown = await response.text();
                
                // Guardar contenido en caché para búsqueda
                postsContent[post.name] = markdown;
                
                // Parsear frontmatter
                const { frontmatter, content } = parseFrontmatter(markdown);
                
                // Construir HTML con metadata + contenido
                let html = '';
                
                // Agregar metadata si existe
                if (frontmatter.title || frontmatter.date || frontmatter.tags) {
                    html += '<div class="post-meta">';
                    if (frontmatter.title) {
                        html += `<h1 class="post-title">${frontmatter.title}</h1>`;
                    }
                    if (frontmatter.date) {
                        html += `<p class="post-date">📅 ${formatDate(frontmatter.date)}</p>`;
                    }
                    if (frontmatter.tags && Array.isArray(frontmatter.tags)) {
                        html += `<div class="post-tags">`;
                        frontmatter.tags.forEach(tag => {
                            html += `<span class="tag">#${tag}</span>`;
                        });
                        html += `</div>`;
                    }
                    html += '</div><hr class="meta-separator">';
                }
                
                // Convertir Markdown a HTML (solo el contenido, sin frontmatter)
                html += marked.parse(content);
                
                articleDiv.innerHTML = html;
                document.getElementById('post-list').style.display = 'none';
                document.getElementById('post-content').classList.add('active');
                document.getElementById('giscus-container').style.display = 'block';
                
                // Cargar Giscus después de que el contenido esté listo
                setTimeout(() => loadGiscus(), 200);
                
                window.scrollTo(0, 0);

            } catch (error) {
                console.error('Error cargando post:', error);
                articleDiv.innerHTML = `
                    <div class="error">
                        <strong>Error cargando el artículo</strong><br>
                        ${error.message}
                    </div>
                `;
            }
        }

        function showList() {
            document.getElementById('post-list').style.display = 'block';
            document.getElementById('post-content').classList.remove('active');
            document.getElementById('giscus-container').style.display = 'none';
            // Limpiar Giscus para recargar en próximo post
            document.getElementById('giscus-container').innerHTML = '';
            giscusLoaded = false;
        }

        function formatTitle(slug) {
            return slug
                .replace(/-/g, ' ')
                .replace(/_/g, ' ')
                .split(' ')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
                .join(' ');
        }

        // =====================================================================
        // FUNCIONES DE GISCUS
        // =====================================================================

        function loadGiscus() {
            const container = document.getElementById('giscus-container');
            
            // Evitar cargar múltiples veces
            if (giscusLoaded || container.querySelector('script')) {
                return;
            }
            
            const script = document.createElement('script');
            script.src = 'https://giscus.app/client.js';
            
            // ⚙️ CONFIGURACIÓN DE GISCUS - IDs REALES
            // ========================================
            script.setAttribute('data-repo', `${GITHUB_USERNAME}/${GITHUB_REPO}`);
            script.setAttribute('data-repo-id', 'R_kgDORfKIsA');
            script.setAttribute('data-category', 'General');
            script.setAttribute('data-category-id', 'DIC_kwDORfKIsM4C3wBu');
            script.setAttribute('data-mapping', 'pathname');
            script.setAttribute('data-strict', '0');
            script.setAttribute('data-reactions-enabled', '1');
            script.setAttribute('data-emit-metadata', '0');
            script.setAttribute('data-input-position', 'bottom');
            script.setAttribute('data-theme', 'preferred_color_scheme');
            script.setAttribute('data-lang', 'es');
            script.setAttribute('crossorigin', 'anonymous');
            script.setAttribute('async', '');
            
            container.appendChild(script);
            giscusLoaded = true;
            
            console.log('✅ Giscus cargado correctamente');
            console.log('📝 Repo:', `${GITHUB_USERNAME}/${GITHUB_REPO}`);
            console.log('📝 Repo ID:', 'R_kgDORfKIsA');
            console.log('📝 Category ID:', 'DIC_kwDORfKIsM4C3wBu');
        }

        // =====================================================================
        // FUNCIONES UTILITARIAS
        // =====================================================================

        function highlightMatch(text, query) {
            const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
            return text.replace(regex, '<mark class="search-highlight">$1</mark>');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
    </script>
<!-- Registro de Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then((reg) => {
          console.log('✅ Service Worker registrado:', reg.scope);
        })
        .catch((err) => {
          console.error('❌ Error al registrar Service Worker:', err);
        });
    });
  }
</script>

</body>
</html>
